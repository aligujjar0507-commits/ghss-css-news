<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Address</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    text-align:center;
    color:white;
}

.container{
    margin-top:80px;
    padding:20px;
}

h1{
    font-size:50px;
    font-weight:bold;
    text-shadow:3px 3px 10px rgba(0,0,0,0.5);
}

.location-box{
    margin:30px auto;
    width:90%;
    max-width:700px;
    background:white;
    color:#222;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.3);
}

.location-text{
    font-size:28px;
    font-weight:bold;
    color:#0d6efd;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    text-decoration:none;
    color:white;
    background:#28a745;
    border-radius:10px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>📍 School Address</h1>

    <div class="location-box">
        <p class="location-text">
            School Location Here
        </p>

        <a class="btn" href="https://maps.app.goo.gl/hvwmraAZBf16innWA" target="_blank">
            Open School Location
        </a>
    </div>
</div>

</body>
  </html>
