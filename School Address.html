<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Address</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e40af,#2563eb);
    text-align:center;
    color:white;
}

.container{
    padding:40px 20px;
}

h1{
    font-size:50px;
    font-weight:bold;
    text-shadow:3px 3px 10px rgba(0,0,0,0.5);
    margin-bottom:20px;
}

.location-box{
    margin:20px auto;
    width:90%;
    max-width:800px;
    background:white;
    color:#222;
    padding:30px;
    border-radius:25px;
    box-shadow:0 0 25px rgba(255,255,255,0.3);
}

.location-text{
    font-size:30px;
    font-weight:bold;
    color:#0d6efd;
    margin-bottom:20px;
}

.info{
    font-size:22px;
    line-height:1.8;
    font-weight:bold;
    color:#333;
    margin:20px 0;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:15px 35px;
    font-size:20px;
    text-decoration:none;
    color:white;
    background:#28a745;
    border-radius:12px;
    font-weight:bold;
}

.footer{
    margin-top:30px;
    font-size:16px;
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

    <h1>📍 School Address</h1>

    <div class="location-box">

        <div class="location-text">
            Government Higher Secondary School Chowk Sarwar Shaheed
        </div>

        <div class="info">
            📌 Chowk Sarwar Shaheed<br>
            🛣️ Road: Kot Addu Road<br>
            🏙️ District: Muzaffargarh, Punjab, Pakistan
        </div>

        <a class="btn" href="https://maps.app.goo.gl/hvwmraAZBf16innWA" target="_blank">
            Open School Location
        </a>

    </div>

    <div class="footer">
        Developed by Hasnain Ali
    </div>

</div>

</body>
</html>
